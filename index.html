<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabInvest - API CRUD Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #4ade80;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            font-size: 0.8em;
        }

        button:hover {
            background: #764ba2;
        }

        button.get {
            background: #3b82f6;
        }

        button.get:hover {
            background: #1d4ed8;
        }

        button.post {
            background: #10b981;
        }

        button.post:hover {
            background: #059669;
        }

        button.put {
            background: #f59e0b;
        }

        button.put:hover {
            background: #d97706;
        }

        button.delete {
            background: #ef4444;
        }

        button.delete:hover {
            background: #dc2626;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .modal-footer {
            text-align: right;
            margin-top: 20px;
            gap: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .modal-footer button {
            width: auto;
            padding: 12px 20px;
        }

        .results-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .results-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .result-item {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .result-item h3 {
            color: #333;
            margin-bottom: 10px;
        }

        pre {
            background: #1f2937;
            color: #10b981;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }

        .error {
            background: #fee;
            border-left-color: #ef4444 !important;
            color: #991b1b;
        }

        .success {
            background: #efe;
            border-left-color: #10b981 !important;
            color: #065f46;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
        }

        .warning {
            color: #ef4444;
            font-weight: bold;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .card-actions {
                grid-template-columns: 1fr 1fr;
            }

            .modal-content {
                width: 95%;
                margin: 50% auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LabInvest API</h1>
            <p>Dashboard CRUD Completo - GET, POST, PUT, DELETE</p>
            <div class="status" id="status">Verificando...</div>
        </header>

        <div class="dashboard">
            <!-- USUÁRIOS -->
            <div class="card">
                <h2>Usuários</h2>
                <div class="card-actions">
                    <button class="get" onclick="listarUsuarios()">Listar</button>
                    <button class="post" onclick="abrirFormularioUsuario()">Criar</button>
                    <button class="put" onclick="abrirFormularioAtualizarUsuario()">Atualizar</button>
                    <button class="delete" onclick="abrirFormularioDeletarUsuario()">Deletar</button>
                </div>
            </div>

            <!-- AGENDAMENTOS -->
            <div class="card">
                <h2>Agendamentos</h2>
                <div class="card-actions">
                    <button class="get" onclick="listarAgendamentos()">Listar</button>
                    <button class="post" onclick="abrirFormularioAgendamento()">Criar</button>
                    <button class="put" onclick="abrirFormularioAtualizarAgendamento()">Atualizar</button>
                    <button class="delete" onclick="abrirFormularioDeletarAgendamento()">Deletar</button>
                </div>
            </div>

            <!-- CHATS -->
            <div class="card">
                <h2>Chats</h2>
                <div class="card-actions">
                    <button class="get" onclick="listarChats()">Listar</button>
                    <button class="post" onclick="abrirFormularioChat()">Criar</button>
                    <button class="put" onclick="abrirFormularioAtualizarChat()">Atualizar</button>
                    <button class="delete" onclick="abrirFormularioDeletarChat()">Deletar</button>
                </div>
            </div>

            <!-- SERVIÇOS -->
            <div class="card">
                <h2>Serviços</h2>
                <div class="card-actions">
                    <button class="get" onclick="listarServicos()">Listar</button>
                    <button class="post" onclick="abrirFormularioServico()">Criar</button>
                    <button class="put" onclick="abrirFormularioAtualizarServico()">Atualizar</button>
                    <button class="delete" onclick="abrirFormularioDeletarServico()">Deletar</button>
                </div>
            </div>

            <!-- POSTAGENS -->
            <div class="card">
                <h2>Postagens</h2>
                <div class="card-actions">
                    <button class="get" onclick="listarPostagens()">Listar</button>
                    <button class="post" onclick="abrirFormularioPostagem()">Criar</button>
                    <button class="put" onclick="abrirFormularioAtualizarPostagem()">Atualizar</button>
                    <button class="delete" onclick="abrirFormularioDeletarPostagem()">Deletar</button>
                </div>
            </div>

            <!-- HEALTH CHECK -->
            <div class="card">
                <h2>Health Check</h2>
                <div class="card-actions" style="grid-template-columns: 1fr;">
                    <button class="get" onclick="testarHealth()">Verificar</button>
                </div>
            </div>
        </div>

        <div class="results-section">
            <h2>Resultados</h2>
            <div id="results"></div>
        </div>

        <footer>
            <p>&copy; 2026 LabInvest - API Backend CRUD Completo</p>
        </footer>
    </div>

    <!-- MODAL PARA FORMULÁRIOS -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="fecharModal()">&times;</span>
                <h2 id="formTitulo">Formulário</h2>
            </div>
            <form id="formPrincipal" onsubmit="enviarFormulario(event)">
                <div id="formCampos"></div>
                <div class="modal-footer">
                    <button type="button" onclick="fecharModal()" style="background: #ccc; color: #333;">Cancelar</button>
                    <button type="submit" class="post">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Verificar status do servidor
        async function verificarStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('status').innerHTML = 'Servidor Online';
                    document.getElementById('status').style.background = '#4ade80';
                } else {
                    document.getElementById('status').innerHTML = 'Servidor Offline';
                }
            } catch (error) {
                document.getElementById('status').innerHTML = 'Erro de Conexão';
            }
        }

        // ===== GET =====
        async function listarDados(nome, url) {
            exibirCarregando(`Listar ${nome}`);
            try {
                const response = await fetch(url);
                const data = await response.json();
                exibirResultado(`Listar ${nome}`, data, response.ok);
            } catch (error) {
                exibirErro(`Listar ${nome}`, error.message);
            }
        }

        async function testarHealth() { listarDados('Health', `${API_URL}/health`); }
        async function listarUsuarios() { listarDados('Usuários', `${API_URL}/users`); }
        async function listarAgendamentos() { listarDados('Agendamentos', `${API_URL}/agendamentos`); }
        async function listarChats() { listarDados('Chats', `${API_URL}/chats`); }
        async function listarServicos() { listarDados('Serviços', `${API_URL}/servicos`); }
        async function listarPostagens() { listarDados('Postagens', `${API_URL}/posts`); }

        // ===== MODAL =====
        function abrirModal(titulo, campos) {
            document.getElementById('formTitulo').textContent = titulo;
            document.getElementById('formCampos').innerHTML = campos;
            document.getElementById('formModal').style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('formModal').style.display = 'none';
            document.getElementById('formPrincipal').reset();
        }

        window.onclick = function(event) {
            const modal = document.getElementById('formModal');
            if (event.target == modal) {
                fecharModal();
            }
        }

        // ===== POST - CRIAR =====
        function abrirFormularioUsuario() {
            abrirModal('Criar Usuário', `
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <input type="tel" id="telefone" placeholder="Telefone (opcional)">
                <input type="text" id="endereco" placeholder="Endereço (opcional)">
                <select id="role"><option value="cliente">Cliente</option><option value="especialista">Especialista</option><option value="admin">Admin</option></select>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    nome: document.getElementById('nome').value,
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value,
                    telefone: document.getElementById('telefone').value || null,
                    endereco: document.getElementById('endereco').value || null,
                    role: document.getElementById('role').value,
                    ativo: true
                };
                await enviarDados('Criar Usuário', '/users', 'POST', data);
                fecharModal();
            };
        }

        function abrirFormularioAgendamento() {
            abrirModal('Criar Agendamento', `
                <input type="number" id="userId" placeholder="ID do Usuário" required>
                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="descricao" placeholder="Descrição">
                <input type="datetime-local" id="dataInicio" required>
                <input type="number" id="duracao" placeholder="Duração (minutos)">
                <input type="text" id="local" placeholder="Local">
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    userId: parseInt(document.getElementById('userId').value),
                    titulo: document.getElementById('titulo').value,
                    descricao: document.getElementById('descricao').value || null,
                    dataInicio: document.getElementById('dataInicio').value,
                    duracao: document.getElementById('duracao').value ? parseInt(document.getElementById('duracao').value) : null,
                    local: document.getElementById('local').value || null,
                    status: 'agendado'
                };
                await enviarDados('Criar Agendamento', '/agendamentos', 'POST', data);
                fecharModal();
            };
        }

        function abrirFormularioChat() {
            abrirModal('Criar Chat', `
                <input type="number" id="userId" placeholder="ID do Usuário" required>
                <input type="text" id="assunto" placeholder="Assunto" required>
                <textarea id="mensagem" placeholder="Mensagem" required rows="4"></textarea>
                <select id="prioridade"><option value="normal">Normal</option><option value="alta">Alta</option><option value="baixa">Baixa</option></select>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    userId: parseInt(document.getElementById('userId').value),
                    assunto: document.getElementById('assunto').value,
                    mensagem: document.getElementById('mensagem').value,
                    prioridade: document.getElementById('prioridade').value
                };
                await enviarDados('Criar Chat', '/chats', 'POST', data);
                fecharModal();
            };
        }

        function abrirFormularioServico() {
            abrirModal('Criar Serviço', `
                <input type="text" id="nome" placeholder="Nome do Serviço" required>
                <textarea id="descricao" placeholder="Descrição" rows="3"></textarea>
                <input type="number" id="preco" placeholder="Preço" step="0.01" required>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    nome: document.getElementById('nome').value,
                    descricao: document.getElementById('descricao').value || null,
                    preco: parseFloat(document.getElementById('preco').value)
                };
                await enviarDados('Criar Serviço', '/servicos', 'POST', data);
                fecharModal();
            };
        }

        function abrirFormularioPostagem() {
            abrirModal('Criar Postagem', `
                <input type="number" id="userId" placeholder="ID do Usuário" required>
                <input type="text" id="titulo" placeholder="Título" required>
                <textarea id="conteudo" placeholder="Conteúdo" required rows="6"></textarea>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    userId: parseInt(document.getElementById('userId').value),
                    titulo: document.getElementById('titulo').value,
                    conteudo: document.getElementById('conteudo').value
                };
                await enviarDados('Criar Postagem', '/posts', 'POST', data);
                fecharModal();
            };
        }

        // ===== PUT - ATUALIZAR =====
        function abrirFormularioAtualizarUsuario() {
            abrirModal('Atualizar Usuário', `
                <input type="number" id="id" placeholder="ID do Usuário" required>
                <input type="text" id="nome" placeholder="Nome">
                <input type="email" id="email" placeholder="Email">
                <input type="tel" id="telefone" placeholder="Telefone">
                <input type="text" id="endereco" placeholder="Endereço">
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('id').value;
                const data = {};
                if (document.getElementById('nome').value) data.nome = document.getElementById('nome').value;
                if (document.getElementById('email').value) data.email = document.getElementById('email').value;
                if (document.getElementById('telefone').value) data.telefone = document.getElementById('telefone').value;
                if (document.getElementById('endereco').value) data.endereco = document.getElementById('endereco').value;
                await enviarDados('Atualizar Usuário', `/users/${id}`, 'PUT', data);
                fecharModal();
            };
        }

        function abrirFormularioAtualizarAgendamento() {
            abrirModal('Atualizar Agendamento', `
                <input type="number" id="id" placeholder="ID do Agendamento" required>
                <input type="text" id="titulo" placeholder="Título">
                <select id="status"><option value="">-- Status --</option><option value="agendado">Agendado</option><option value="confirmado">Confirmado</option><option value="realizado">Realizado</option><option value="cancelado">Cancelado</option></select>
                <input type="text" id="local" placeholder="Local">
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('id').value;
                const data = {};
                if (document.getElementById('titulo').value) data.titulo = document.getElementById('titulo').value;
                if (document.getElementById('status').value) data.status = document.getElementById('status').value;
                if (document.getElementById('local').value) data.local = document.getElementById('local').value;
                await enviarDados('Atualizar Agendamento', `/agendamentos/${id}`, 'PUT', data);
                fecharModal();
            };
        }

        function abrirFormularioAtualizarChat() {
            abrirModal('Atualizar Chat', `
                <input type="number" id="id" placeholder="ID do Chat" required>
                <input type="text" id="assunto" placeholder="Assunto">
                <textarea id="mensagem" placeholder="Mensagem" rows="3"></textarea>
                <select id="status"><option value="">-- Status --</option><option value="aberto">Aberto</option><option value="respondido">Respondido</option><option value="fechado">Fechado</option></select>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('id').value;
                const data = {};
                if (document.getElementById('assunto').value) data.assunto = document.getElementById('assunto').value;
                if (document.getElementById('mensagem').value) data.mensagem = document.getElementById('mensagem').value;
                if (document.getElementById('status').value) data.status = document.getElementById('status').value;
                await enviarDados('Atualizar Chat', `/chats/${id}`, 'PUT', data);
                fecharModal();
            };
        }

        function abrirFormularioAtualizarServico() {
            abrirModal('Atualizar Serviço', `
                <input type="number" id="id" placeholder="ID do Serviço" required>
                <input type="text" id="nome" placeholder="Nome">
                <textarea id="descricao" placeholder="Descrição" rows="3"></textarea>
                <input type="number" id="preco" placeholder="Preço" step="0.01">
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('id').value;
                const data = {};
                if (document.getElementById('nome').value) data.nome = document.getElementById('nome').value;
                if (document.getElementById('descricao').value) data.descricao = document.getElementById('descricao').value;
                if (document.getElementById('preco').value) data.preco = parseFloat(document.getElementById('preco').value);
                await enviarDados('Atualizar Serviço', `/servicos/${id}`, 'PUT', data);
                fecharModal();
            };
        }

        function abrirFormularioAtualizarPostagem() {
            abrirModal('Atualizar Postagem', `
                <input type="number" id="id" placeholder="ID da Postagem" required>
                <input type="text" id="titulo" placeholder="Título">
                <textarea id="conteudo" placeholder="Conteúdo" rows="4"></textarea>
            `);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('id').value;
                const data = {};
                if (document.getElementById('titulo').value) data.titulo = document.getElementById('titulo').value;
                if (document.getElementById('conteudo').value) data.conteudo = document.getElementById('conteudo').value;
                await enviarDados('Atualizar Postagem', `/posts/${id}`, 'PUT', data);
                fecharModal();
            };
        }

        // ===== DELETE =====
        function abrirFormularioDeletarUsuario() {
            abrirModal('Deletar Usuário', `<div class="warning">AÇÃO IRREVERSÍVEL!</div><input type="number" id="id" placeholder="ID do Usuário" required>`);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                if (confirm('Tem certeza?')) {
                    await enviarDados('Deletar Usuário', `/users/${document.getElementById('id').value}`, 'DELETE', null);
                    fecharModal();
                }
            };
        }

        function abrirFormularioDeletarAgendamento() {
            abrirModal('Deletar Agendamento', `<div class="warning">AÇÃO IRREVERSÍVEL!</div><input type="number" id="id" placeholder="ID do Agendamento" required>`);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                if (confirm('Tem certeza?')) {
                    await enviarDados('Deletar Agendamento', `/agendamentos/${document.getElementById('id').value}`, 'DELETE', null);
                    fecharModal();
                }
            };
        }

        function abrirFormularioDeletarChat() {
            abrirModal('Deletar Chat', `<div class="warning">AÇÃO IRREVERSÍVEL!</div><input type="number" id="id" placeholder="ID do Chat" required>`);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                if (confirm('Tem certeza?')) {
                    await enviarDados('Deletar Chat', `/chats/${document.getElementById('id').value}`, 'DELETE', null);
                    fecharModal();
                }
            };
        }

        function abrirFormularioDeletarServico() {
            abrirModal('Deletar Serviço', `<div class="warning">AÇÃO IRREVERSÍVEL!</div><input type="number" id="id" placeholder="ID do Serviço" required>`);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                if (confirm('Tem certeza?')) {
                    await enviarDados('Deletar Serviço', `/servicos/${document.getElementById('id').value}`, 'DELETE', null);
                    fecharModal();
                }
            };
        }

        function abrirFormularioDeletarPostagem() {
            abrirModal('Deletar Postagem', `<div class="warning">AÇÃO IRREVERSÍVEL!</div><input type="number" id="id" placeholder="ID da Postagem" required>`);
            document.getElementById('formPrincipal').onsubmit = async (e) => {
                e.preventDefault();
                if (confirm('Tem certeza?')) {
                    await enviarDados('Deletar Postagem', `/posts/${document.getElementById('id').value}`, 'DELETE', null);
                    fecharModal();
                }
            };
        }

        // ===== ENVIAR DADOS =====
        async function enviarDados(titulo, url, metodo, data) {
            exibirCarregando(titulo);
            try {
                const options = {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) options.body = JSON.stringify(data);
                
                const response = await fetch(API_URL + url, options);
                const resultado = response.ok ? await response.json() : await response.json().catch(() => ({ erro: 'Erro' }));
                exibirResultado(titulo, resultado, response.ok);
            } catch (error) {
                exibirErro(titulo, error.message);
            }
        }

        // ===== EXIBIÇÃO =====
        function exibirCarregando(titulo) {
            document.getElementById('results').innerHTML = `
                <div class="result-item">
                    <h3>${titulo}</h3>
                    <div class="loading"><div class="spinner"></div>Carregando...</div>
                </div>
            `;
        }

        function exibirResultado(titulo, dados, sucesso) {
            const classe = sucesso ? 'success' : 'error';
            document.getElementById('results').innerHTML = `
                <div class="result-item ${classe}">
                    <h3>${titulo}</h3>
                    <pre>${JSON.stringify(dados, null, 2)}</pre>
                </div>
            `;
        }

        function exibirErro(titulo, mensagem) {
            document.getElementById('results').innerHTML = `
                <div class="result-item error">
                    <h3>${titulo}</h3>
                    <pre>Erro: ${mensagem}</pre>
                </div>
            `;
        }

        verificarStatus();
        setInterval(verificarStatus, 5000);
    </script>
</body>
</html>
